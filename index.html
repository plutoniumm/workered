<!DOCTYPE html>
<html>

<title>Workerize Demo</title>

<body>
	<script type="module">
		import workered from './index.js';

		const workee = workered( `
				export function get(url) {
					return fetch(location.origin+'/'+url).then(asJson);
				}
				function asJson(res) {
					return res.json();
				}
			`, "module" );

		workee.get( 'package.json' ).then( pkg => {
			console.log( 'Got package name: ', pkg );
		} );
	</script>

	<script type="worker">
		console.log('returning');

		return 2;
	</script>

	<script type="module">
		import workered from "./index.js";

		const funcs = document.querySelector( 'script[type="worker"]' ).textContent;

		const data = workered().run( funcs ).then( r => {
			console.log( r );
		} );
	</script>
</body>

</html>
